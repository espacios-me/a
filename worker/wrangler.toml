name = "integrations-hub"
main = "src/index.ts"
compatibility_date = "2024-02-22"
type = "service"

[env.production]
name = "integrations-hub-prod"
routes = [
  { pattern = "api.example.com/*", zone_name = "example.com" }
]

[vars]
# Public origin allowed to call this worker with credentials.
# FRONTEND_ORIGIN = "https://integrations.example.com"

# Session signing secret.
# APP_SESSION_SECRET = "replace-with-a-long-random-secret"

# AI chat.
# GEMINI_API_KEY = "..."
# GEMINI_MODEL = "gemini-2.0-flash"

# Google Workspace SSO.
# GOOGLE_CLIENT_ID = "..."
# GOOGLE_CLIENT_SECRET = "..."
# GOOGLE_REDIRECT_URI = "https://api.example.com/api/auth/sso/callback"

# GitHub SSO.
# GITHUB_CLIENT_ID = "..."
# GITHUB_CLIENT_SECRET = "..."
# GITHUB_REDIRECT_URI = "https://api.example.com/api/auth/sso/callback"

# Optional WhatsApp sending.
# WHATSAPP_TOKEN = "..."
# WHATSAPP_PHONE_ID = "..."

[build]
command = "npm run build"
cwd = "./"
